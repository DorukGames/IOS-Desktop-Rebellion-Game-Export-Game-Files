name: build
on:
  push:
    branches: [ main ]
jobs:
  ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: godot
        run: |
          curl -L "https://bit.ly" -o g.zip
          unzip g.zip
          chmod +x Godot.app/Contents/MacOS/Godot
      - name: templates
        run: |
          curl -L "https://bit.ly" -o t.tpz
          mkdir -p ~/Library/Application\ Support/Godot/export_templates/4.3.stable/
          unzip t.tpz -d tmp
          mv tmp/templates/* ~/Library/Application\ Support/Godot/export_templates/4.3.stable/
      - name: export
        run: |
          mkdir -p out
          ./Godot.app/Contents/MacOS/Godot --headless --export-release "iOS" out/g.zip
          unzip out/g.zip -d out/x
          cd out/x
          xcodebuild -project *.xcodeproj -scheme "iOS" -sdk iphoneos -configuration Release -destination generic/platform=iOS archive -archivePath ../g.xcarchive CODE_SIGNING_ALLOWED=NO
          mkdir -p ../Payload
          cp -r ../g.xcarchive/Products/Applications/*.app ../Payload/
          cd .. && zip -r g.ipa Payload
      - name: upload
        uses: actions/upload-artifact@v4
        with:
          name: game
          path: out/g.ipa
