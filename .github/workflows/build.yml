name: Build iOS IPA

on:
  push:
    branches: [ main ]

jobs:
  ios:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Godot
        run: |
          curl -L https://github.com/godotengine/godot/releases/download/4.3-stable/Godot_v4.3-stable_macos.universal.zip -o godot.zip
          unzip godot.zip -d godot
          chmod +x godot/Godot.app/Contents/MacOS/Godot

      - name: Install export templates
        run: |
          curl -L https://github.com/godotengine/godot/releases/download/4.3-stable/Godot_v4.3-stable_export_templates.tpz -o templates.tpz
          mkdir -p "$HOME/Library/Application Support/Godot/export_templates/4.3.stable"
          unzip templates.tpz -d templates_unpacked
          cp templates_unpacked/templates/ios.zip "$HOME/Library/Application Support/Godot/export_templates/4.3.stable/ios.zip"

      - name: Fix missing iOS Team ID
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path("export_presets.cfg")
          text = path.read_text()

          if 'application/app_store_team_id=' in text:
              text = text.replace(
                  'application/app_store_team_id=""',
                  'application/app_store_team_id="ABCDE12345"'
              )
          else:
              text += '\napplication/app_store_team_id="ABCDE12345"\n'

          path.write_text(text)
          PY

      - name: Import Godot assets
        run: |
          ./godot/Godot.app/Contents/MacOS/Godot --headless --editor --quit

      - name: Export iOS Xcode project
        run: |
          mkdir -p build
          ./godot/Godot.app/Contents/MacOS/Godot --headless --verbose --export-release "iOS" build/ios_project.zip
          unzip build/ios_project.zip -d build/ios_project

      - name: Build unsigned archive
        run: |
          cd build/ios_project
          PROJECT_FILE=$(ls *.xcodeproj | head -n 1)
          SCHEME_NAME="${PROJECT_FILE%.xcodeproj}"

          xcodebuild \
            -project "$PROJECT_FILE" \
            -scheme "$SCHEME_NAME" \
            -sdk iphoneos \
            -configuration Release \
            -destination generic/platform=iOS \
            archive \
            -archivePath ../ios_project.xcarchive \
            CODE_SIGNING_ALLOWED=NO

      - name: Package IPA
        run: |
          mkdir -p build/Payload
          cp -r build/ios_project.xcarchive/Products/Applications/*.app build/Payload/
          cd build
          zip -r game.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: game-ipa
          path: build/game.ipa
