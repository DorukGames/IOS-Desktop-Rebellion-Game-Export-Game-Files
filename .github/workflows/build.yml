name: Build iOS IPA

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Godot
        run: |
          curl -L "https://github.com" -o godot.zip
          unzip godot.zip
          chmod +x Godot.app/Contents/MacOS/Godot

      - name: Templates
        run: |
          curl -L "https://github.com" -o templates.tpz
          mkdir -p ~/Library/Application\ Support/Godot/export_templates/4.3.stable/
          unzip templates.tpz -d tmp
          mv tmp/templates/* ~/Library/Application\ Support/Godot/export_templates/4.3.stable/

      - name: Export
        run: |
          mkdir -p out
          ./Godot.app/Contents/MacOS/Godot --headless --export-release "iOS" out/game.zip
          unzip out/game.zip -d out/xcode
        
      - name: Xcode Build
        run: |
          cd out/xcode
          xcodebuild -project *.xcodeproj -scheme "iOS" -sdk iphoneos -configuration Release -destination generic/platform=iOS archive -archivePath ../game.xcarchive CODE_SIGNING_ALLOWED=NO
      
      - name: IPA
        run: |
          mkdir -p out/Payload
          cp -r out/game.xcarchive/Products/Applications/*.app out/Payload/
          cd out && zip -r game.ipa Payload

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: my_ios_game
          path: out/game.ipa
