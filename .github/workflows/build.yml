name: Build iOS IPA

on:
  push:
    branches:
      - main

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Godot 4.3
        run: |
          curl -L "https://github.com" -o godot.zip
          unzip godot.zip -d godot
          chmod +x godot/Godot.app/Contents/MacOS/Godot

      - name: Download Export Templates
        run: |
          curl -L https://github.com -o templates.tpz
          mkdir -p ~/Library/Application\ Support/Godot/export_templates/4.3.stable/
          unzip templates.tpz -d temp_templates
          mv temp_templates/templates/* ~/Library/Application\ Support/Godot/export_templates/4.3.stable/

      - name: Export Godot Project
        run: |
          mkdir -p build
          ./godot/Godot.app/Contents/MacOS/Godot --headless --export-release "iOS" build/exported_project.zip
        
      - name: Build Xcode Project
        run: |
          cd build
          unzip exported_project.zip
          xcodebuild -project *.xcodeproj -scheme "iOS" -sdk iphoneos -configuration Release -destination generic/platform=iOS archive -archivePath ios_project.xcarchive CODE_SIGNING_ALLOWED=NO
      
      - name: Package Unsigned IPA
        run: |
          APP_PATH=$(find build/ios_project.xcarchive -name "*.app")
          mkdir -p build/Payload
          cp -r "$APP_PATH" build/Payload/
          cd build && zip -r ios_project.ipa Payload

      - name: Upload Finished Game
        uses: actions/upload-artifact@v4
        with:
          name: my_game_ios
          path: build/ios_project.ipa
